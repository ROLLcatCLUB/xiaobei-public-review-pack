<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>执行总控</title>
  <link rel="stylesheet" href="clean.css">
  <link rel="stylesheet" href="design-saas.css">
</head>
<body>
  <div class="shell">
    <main class="page design-saas entry-page">
      <section class="entry-brand-hero">
        <div class="entry-brand-copy">
          <small>智绘教育</small>
          <h1>教学中心</h1>
          <p>把教学内容库、教学设计中心和教学执行中心收束到同一条清晰主线里。</p>
        </div>
        <div class="entry-brand-tags">
          <span>设计</span>
          <span>执行</span>
          <span>AI 助手</span>
        </div>
      </section>

      <div class="page-head">
        <div class="page-title">
          <small>教学执行中心</small>
          <h1>执行总控</h1>
          <p>这里是电脑端调度看板，只看今天要推进什么、哪里卡住；进入“上课”后才处理单节课现场执行。</p>
        </div>
      </div>

      <section class="card hero execution-command-card">
        <div class="hero-meta" id="heroActions"></div>
      </section>

      <section class="actions-grid" id="actionGrid"></section>

      <section class="grid-2" style="margin-top:16px">
        <article class="card panel-card">
          <h2>最近在备的课</h2>
          <div class="list" id="recentList"></div>
        </article>
        <article class="card status-card">
          <h2>当前状态</h2>
          <div class="list" id="statusList"></div>
        </article>
      </section>

      <section class="card panel-card" style="margin-top:16px">
        <h2>移动端执行工具</h2>
        <p class="guide-text">这些页面正在服务器上使用，先作为手机端现场工具接入电脑端总控；后续只在新系统里做汇总和优化，不直接改动线上页面。</p>
        <div class="actions-grid" id="legacyBridgeGrid"></div>
      </section>
    </main>
  </div>

  <script src="feishu-real-data-v1.js"></script>
  <script src="prep_truth_source_v1.js"></script>
  <script src="server-execution-bridge.js"></script>
  <script src="clean-shell.js"></script>
  <script>
    CLEAN_PROTO.mount({ page:'entry', title:'执行总控', assistant:'entry' });
    const source = window.XIAOBEI_PREP_TRUTH_SOURCE_V1;
    const CURRENT_PLAN_KEY = 'xiaobei_semester_plan_current_v1';
    const DRAFT_PLAN_KEY = 'xiaobei_semester_plan_draft_v1';

    function readLocalJson(key){
      try{
        return JSON.parse(localStorage.getItem(key) || 'null');
      }catch(error){
        return null;
      }
    }

    function continueHref(item){
      if (!item || !item.latest_draft) return 'picker.html?flow=fast';
      const coursePlanItem = item.execution_context || item.runtime_task;
      const draft = item.latest_draft;
      const query = new URLSearchParams({
        course_plan_item_id: coursePlanItem.course_plan_item_id,
        lesson_key: coursePlanItem.lesson_key
      });
      if (draft.draft_mode === 'refine') return `refine.html?${query.toString()}`;
      return `draft.html?entry=${draft.draft_mode === 'minimal' ? 'minimal' : 'rapid'}&${query.toString()}`;
    }

    function renderHero(){
      const recent = source.listRecentPrepRuns(1)[0];
      const recentContext = recent ? (recent.execution_context || recent.runtime_task) : null;
      const currentPlan = readLocalJson(CURRENT_PLAN_KEY);
      const draftPlan = readLocalJson(DRAFT_PLAN_KEY);
      const tasks = source.listCoursePlanItems();
      const taskCount = tasks.length;
      const classroomRuns = source.listClassroomRuns ? source.listClassroomRuns() : [];
      const assignments = source.listAssignmentInstances ? source.listAssignmentInstances() : [];
      const slots = assignments.flatMap(item => source.listSubmissionSlots({ assignment_instance_id: item.assignment_instance_id }));
      const submittedCount = slots.filter(item => item.submit_status === '已交').length;
      const unevaluatedCount = slots.filter(item => item.submit_status === '已交' && !item.final_score).length;
      const pendingAssignments = assignments.filter(item => {
        const itemSlots = source.listSubmissionSlots({ assignment_instance_id: item.assignment_instance_id });
        return itemSlots.some(slot => slot.submit_status !== '已交');
      }).length;
      const nextTask = recentContext || tasks[0] || null;
      const actions = document.getElementById('heroActions');
      actions.innerHTML = `
        <div class="command-board">
          <div class="command-board-main">
            <small>总控视角</small>
            <h2>${nextTask ? `下一步：${nextTask.topic_name}` : '先生成学期安排'}</h2>
            <p>${nextTask ? `${nextTask.class_name || '待选班级'} · ${nextTask.week_label || '待定周次'} · ${nextTask.day_label || ''}${nextTask.period || ''}` : (currentPlan ? '已有安排，可以从选课进入课堂。' : (draftPlan ? '已有草案待确认。' : '先从教材目录和课表生成一份安排。'))}</p>
            <div class="inline-actions" style="margin-top:14px">
              <a class="btn primary" href="${nextTask ? `picker.html?course_plan_item_id=${nextTask.course_plan_item_id || ''}&lesson_key=${nextTask.lesson_key || ''}` : 'planner.html'}">${nextTask ? '去选课 / 上课' : '生成学期安排'}</a>
              <a class="btn" href="assignments.html">看收作业</a>
              <a class="btn" href="evaluation.html">看评价</a>
            </div>
          </div>
          <div class="command-stat-grid">
            <div class="command-stat"><small>课次池</small><strong>${taskCount}</strong><span>${currentPlan ? '已确认安排' : (draftPlan ? '草案待确认' : '待生成')}</span></div>
            <div class="command-stat"><small>上课记录</small><strong>${classroomRuns.length}</strong><span>已保存现场状态</span></div>
            <div class="command-stat"><small>待收作业</small><strong>${pendingAssignments}</strong><span>${submittedCount}/${slots.length} 已交</span></div>
            <div class="command-stat"><small>待评价</small><strong>${unevaluatedCount}</strong><span>学生作品进入后处理</span></div>
          </div>
        </div>
      `;
    }

    function renderActions(){
      document.getElementById('actionGrid').innerHTML = `
        <a class="action-card nav-card" href="planner.html">
          <strong>1. 学期安排</strong>
          <span class="guide-text">读取课表、教材目录和节假日，先形成可调整的学期周历。</span>
        </a>
        <a class="action-card nav-card" href="picker.html">
          <strong>2. 选课</strong>
          <span class="guide-text">从已排课次中锁定今天要上的班级、周次、节次和课题。</span>
        </a>
        <a class="action-card nav-card" href="classroom.html">
          <strong>3. 上课</strong>
          <span class="guide-text">单节课现场执行：看备课支撑、课堂清单、作业入口和记录入口。</span>
        </a>
        <a class="action-card nav-card" href="assignments.html">
          <strong>4. 收作业</strong>
          <span class="guide-text">查看本学期作业实例、班级提交情况和待收作品。</span>
        </a>
        <a class="action-card nav-card" href="evaluation.html">
          <strong>5. 评价</strong>
          <span class="guide-text">基于已收作品进入小评与维度评价，后续接学生作品闭环。</span>
        </a>
        <a class="action-card nav-card" href="class-record.html">
          <strong>课堂记录</strong>
          <span class="guide-text">当前先承接 Coze 智能体的课堂观察、口述记录和课后整理。</span>
        </a>
        <a class="action-card nav-card" href="design-center.html">
          <strong>回到教学设计中心</strong>
          <span class="guide-text">需要补大单元、课时内容或作业定义时，再回设计中心完善。</span>
        </a>
      `;
    }

    function renderRecent(){
      const recent = source.listRecentPrepRuns(4);
      const list = document.getElementById('recentList');
      if (!recent.length) {
        list.innerHTML = '<div class="empty">暂无已保存运行稿</div>';
        return;
      }
      list.innerHTML = recent.map(item => {
        const executionContext = item.execution_context || item.runtime_task;
        return `
        <div class="list-item">
          <div class="list-item-head">
            <div>
              <strong>${executionContext.topic_name}</strong>
              <div class="detail-text tiny">${executionContext.class_name} · ${executionContext.week_label} · ${executionContext.day_label}${executionContext.period}</div>
            </div>
            <span class="status green">${source.getSavedDraftLabel(item.latest_draft.draft_mode)}</span>
          </div>
          <div class="inline-actions" style="margin-top:10px">
            <span class="pill">${executionContext.status}</span>
            <span class="pill">${item.latest_draft.saved_at ? new Date(item.latest_draft.saved_at).toLocaleString('zh-CN',{hour12:false}) : ''}</span>
            <a class="btn" href="${continueHref(item)}">${source.getContinueActionLabel(item.latest_draft.draft_mode)}</a>
          </div>
        </div>
      `;
      }).join('');
    }

    function renderStatus(){
      const drafts = source.listPrepRunDrafts();
      const quickCount = drafts.filter(item => item.draft_mode === 'rapid').length;
      const refineCount = drafts.filter(item => item.draft_mode === 'refine').length;
      document.getElementById('statusList').innerHTML = `
        <div class="list-item"><strong>设计中心</strong><div class="guide-text">单元设计 → 课时设计 → 完整设计稿</div></div>
        <div class="list-item"><strong>执行中心</strong><div class="guide-text">学期安排 → 选课 → 上课 → 收作业 → 评价 → 课堂记录</div></div>
        <div class="list-item"><strong>已保存快速运行稿</strong><div class="detail-text tiny">${quickCount} 节</div></div>
        <div class="list-item"><strong>已保存精修运行稿</strong><div class="detail-text tiny">${refineCount} 节</div></div>
        <div class="list-item"><strong>入口原则</strong><div class="guide-text">先确认课在哪里上，再决定这节课怎么备。</div></div>
      `;
    }

    function legacyHref(path){
      const bridge = window.XIAOBEI_SERVER_EXECUTION_BRIDGE_V1;
      return bridge ? bridge.legacyHref(path) : (window.location.protocol === 'file:' ? `https://47.102.219.247/${path}` : `/${path}`);
    }

    function renderLegacyBridge(){
      document.getElementById('legacyBridgeGrid').innerHTML = `
        <a class="action-card nav-card" href="${legacyHref('student_submit_kiosk.html')}" target="_blank" rel="noopener">
          <strong>课堂提交机</strong>
          <span class="guide-text">放进“收作业”：学生作品上传、补生成作业槽、班级学生选择。</span>
        </a>
        <a class="action-card nav-card" href="${legacyHref('work_manage.html')}" target="_blank" rel="noopener">
          <strong>作品管理</strong>
          <span class="guide-text">放进“收作业 / 评价”：待评价、已评价、回收站、图片调整。</span>
        </a>
        <a class="action-card nav-card" href="${legacyHref('xiaoping_review.html')}" target="_blank" rel="noopener">
          <strong>小评工作台</strong>
          <span class="guide-text">放进“评价”：作品进入后，再按维度和评语生成评价结果。</span>
        </a>
        <a class="action-card nav-card" href="${legacyHref('bot_chat.html')}" target="_blank" rel="noopener">
          <strong>Coze / 智能体互动</strong>
          <span class="guide-text">放进“课堂记录”：课中口述、观察整理、课后反思先由 Coze 承接。</span>
        </a>
      `;
    }

    renderHero();
    renderActions();
    renderRecent();
    renderStatus();
    renderLegacyBridge();
  </script>
</body>
</html>
