<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学期安排与排课</title>
  <link rel="stylesheet" href="clean.css">
  <link rel="stylesheet" href="design-saas.css">
</head>
<body>
  <div class="shell">
    <main class="page design-saas calendar-page">
      <div class="page-head">
        <div class="page-title">
          <small>教学执行中心</small>
          <h1>学期安排</h1>
          <p>确认本学期内容节奏、周次变化和每节课的备课位置；需要备课时，从这里锁定一节课进入课前简报。</p>
        </div>
        <div class="head-actions">
          <a class="btn" href="planner.html">生成/重算学期安排</a>
          <a class="btn primary" id="goPickerBtn" href="picker.html">进入正式选课</a>
        </div>
      </div>

      <section class="card status-card hero" id="planBanner"></section>

      <section class="grid-2" style="margin-top:16px">
        <article class="card panel-card">
          <div class="page-head" style="margin:0 0 12px">
            <div class="page-title" style="gap:2px">
              <small>周历</small>
              <h1 style="font-size:24px">本学期安排</h1>
            </div>
          </div>
          <div class="list" id="weekList"></div>
        </article>

        <article class="card editor-card">
          <div class="page-head" style="margin:0 0 12px">
            <div class="page-title" style="gap:2px">
              <small id="sideTag">本周</small>
              <h1 style="font-size:24px" id="sideTitle">第1周</h1>
            </div>
          </div>
          <div id="weekDetail" class="section"></div>
          <div id="adjustPanel" class="section" style="margin-top:16px"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="feishu-real-data-v1.js"></script>
  <script src="prep_truth_source_v1.js"></script>
  <script src="clean-shell.js"></script>
  <script>
    CLEAN_PROTO.mount({ page:'calendar', title:'学期安排与排课', assistant:'calendar' });
    const DRAFT_KEY = 'xiaobei_semester_plan_draft_v1';
    const CURRENT_KEY = 'xiaobei_semester_plan_current_v1';
    const source = window.XIAOBEI_PREP_TRUTH_SOURCE_V1;
    const params = new URLSearchParams(window.location.search);
    const tasks = source.listCoursePlanItems();

    function defaultWeeks(){
      const weekPlans = source.listSemesterWeekPlans();
      const grouped = weekPlans.map(weekPlan => {
        const rows = tasks.filter(item => Number(item.week_no) === Number(weekPlan.week_no));
        return {
          semester_plan_id: weekPlan.semester_plan_id,
          semester_week_plan_id: weekPlan.semester_week_plan_id,
          week_no: weekPlan.week_no,
          week_label: weekPlan.week_label,
          date_range: weekPlan.date_range,
          grade_scope: weekPlan.grade_scope,
          lesson_count: weekPlan.lesson_capacity || rows.length,
          planned_summary: weekPlan.planned_summary,
          actual_summary: weekPlan.actual_summary,
          holiday_summary: weekPlan.holiday_summary,
          note: weekPlan.note,
          rows
        };
      });
      return grouped;
    }

    function readJson(key){
      try{
        return JSON.parse(localStorage.getItem(key) || 'null');
      }catch(error){
        return null;
      }
    }

    function saveJson(key, value){
      localStorage.setItem(key, JSON.stringify(value));
    }

    function ensureCurrentPlan(){
      const existing = readJson(CURRENT_KEY);
      if (existing && Array.isArray(existing.weeks) && existing.weeks.length) {
        const upgraded = {
          ...existing,
          weeks: existing.weeks.map(week => {
            const rows = Array.isArray(week.rows) && week.rows.length
              ? week.rows
              : tasks.filter(item => Number(item.week_no) === Number(week.week_no));
            return {
              ...week,
              semester_plan_id: week.semester_plan_id || existing.semester_plan_id || 'semester-2025-2-xutao-g3-art',
              semester_week_plan_id: week.semester_week_plan_id || `${existing.semester_plan_id || 'semester-2025-2-xutao-g3-art'}-week-${week.week_no}`,
              lesson_count: week.lesson_count || rows.length,
              rows
            };
          })
        };
        saveJson(CURRENT_KEY, upgraded);
        return upgraded;
      }
      const seeded = {
        object_type:'semester_plan',
        semester_plan_id:'semester-2025-2-xutao-g3-art',
        source:'manual',
        updatedAt:new Date().toISOString(),
        weeks: defaultWeeks()
      };
      saveJson(CURRENT_KEY, seeded);
      return seeded;
    }

    function getPlanState(){
      return {
        draft: readJson(DRAFT_KEY),
        current: ensureCurrentPlan()
      };
    }

    let state = getPlanState();
    let activeWeek = Number(params.get('week')) || state.current.weeks[0].week_no;

    function renderBanner(){
      const banner = document.getElementById('planBanner');
      const draft = state.draft;
      const current = state.current;
      banner.innerHTML = `
        <div class="execution-flow">
          <a class="execution-step-card ${current ? 'is-done' : ''}" href="planner.html">
            <span>01</span>
            <strong>学期安排</strong>
            <em>${current.source === 'planner' ? '来自 AI 草案' : '人工维护中'}</em>
          </a>
          <a class="execution-step-card is-current" href="calendar.html">
            <span>02</span>
            <strong>学期落位</strong>
            <em>按周次查看并处理顺延、替换、插入</em>
          </a>
          <a class="execution-step-card" href="picker.html">
            <span>03</span>
            <strong>正式选课</strong>
            <em>锁定要备的一节课，再进入课前简报</em>
          </a>
        </div>
        <div class="page-head" style="margin:14px 0 0">
          <div class="page-title" style="gap:6px">
            <h1 style="font-size:26px;margin:0">${draft ? '已存在一份 AI 草案，可决定是否写入当前安排' : '当前安排用于锁定本学期备课对象'}</h1>
            <small>${draft ? `草案更新时间：${new Date(draft.updatedAt).toLocaleString('zh-CN')}` : '生成学期安排后，再从这里把备课对象落到周次、班级和节次。'}</small>
          </div>
          <div class="head-actions">
            ${draft ? '<button class="btn primary" type="button" id="applyDraftBtn">写入当前安排</button><a class="btn" href="planner.html">继续修改草案</a>' : '<a class="btn" href="planner.html">去生成学期安排</a>'}
          </div>
        </div>
      `;
      if (draft) {
        document.getElementById('applyDraftBtn').onclick = () => {
          state.current = {
            object_type:'semester_plan',
            semester_plan_id:draft.semester_plan_id || 'semester-2025-2-xutao-g3-art',
            source:'planner',
            updatedAt:new Date().toISOString(),
            weeks: draft.weeks.map(item => Object.assign({}, item))
          };
          saveJson(CURRENT_KEY, state.current);
          renderAll();
        };
      }
    }

    function renderWeeks(){
      document.getElementById('weekList').innerHTML = state.current.weeks.map(week => `
        <div class="list-item ${week.week_no === activeWeek ? 'active' : ''}" data-week="${week.week_no}">
          <div class="list-item-head">
            <div>
              <strong>${week.week_label}</strong>
              <div class="muted tiny">${week.date_range}</div>
            </div>
            <span class="status ${week.actual_summary !== '按原计划执行' ? 'amber' : 'green'}">${week.lesson_count || 0} 节</span>
          </div>
          <div class="inline-actions" style="margin-top:10px">
            <span class="pill">原计划：${week.planned_summary}</span>
            <span class="pill">实际执行：${week.actual_summary}</span>
          </div>
        </div>
      `).join('');
      document.querySelectorAll('[data-week]').forEach(node => {
        node.onclick = () => {
          activeWeek = Number(node.dataset.week);
          renderDetail();
        };
      });
    }

    function renderDetail(){
      const week = state.current.weeks.find(item => item.week_no === activeWeek);
      if (!week) return;
      document.getElementById('sideTitle').textContent = week.week_label;
      document.getElementById('goPickerBtn').href = `picker.html?week=${week.week_no}`;
      function taskPickerHref(task){
        const query = new URLSearchParams({
          week: week.week_no,
          course_plan_item_id: task.course_plan_item_id,
          lesson_key: task.lesson_key
        });
        return `picker.html?${query.toString()}`;
      }
      document.getElementById('weekDetail').innerHTML = `
        <div class="identity-strip">
          <div class="identity-item"><small>日期</small><strong>${week.date_range}</strong></div>
          <div class="identity-item"><small>年级</small><strong>${week.grade_scope || '三年级'}</strong></div>
          <div class="identity-item"><small>本周课时</small><strong>${week.lesson_count || 0} 节</strong></div>
          <div class="identity-item"><small>原计划</small><strong>${week.planned_summary}</strong></div>
          <div class="identity-item"><small>实际执行</small><strong>${week.actual_summary}</strong></div>
        </div>
        <div class="list">
          ${(() => {
            const cards = week.rows || [];
            return cards.map(item => `
              <div class="list-item">
                <div class="list-item-head">
                  <div>
                    <strong>${item.class_name || week.grade_scope} · ${item.topic_name}</strong>
                    <div class="muted tiny">${item.date_label || week.date_range} · ${item.day_label || ''}${item.period || ''} · ${item.lesson_type || '待定课型'}</div>
                  </div>
                  <span class="status ${item.status_code === 'not_started' ? 'rose' : 'green'}">${item.status || '已排课'}</span>
                </div>
                <div class="inline-actions" style="margin-top:10px">
                  <span class="pill">${item.unit_name || week.planned_summary}</span>
                  <span class="pill">${item.assignment_required ? '有作业链' : '无作业链'}</span>
                  <a class="btn" href="${taskPickerHref(item)}">备这一节</a>
                </div>
              </div>
            `).join('');
          })() || `<div class="list-item"><strong>${week.planned_summary}</strong><div class="muted tiny">${week.note || '本周内容已从 AI 草案写入，可继续人工调整。'}</div></div>`}
        </div>
      `;
      document.getElementById('adjustPanel').innerHTML = `
        <div class="card editor-card">
          <h3>排课与调整</h3>
          <div class="grid-2">
            <div class="field">
              <label>调整范围</label>
              <select id="adjustScope">
                <option>本周</option>
                <option>本单元</option>
                <option>后半学期</option>
              </select>
            </div>
            <div class="field">
              <label>调整动作</label>
              <select id="adjustAction">
                <option>顺延一节</option>
                <option>替换内容</option>
                <option>插入活动课</option>
                <option>压缩本周课时</option>
              </select>
            </div>
          </div>
          <div class="field" style="margin-top:12px">
            <label>原计划</label>
            <input id="plannedSummaryInput" value="${week.planned_summary}">
          </div>
          <div class="field" style="margin-top:12px">
            <label>实际执行</label>
            <input id="actualSummaryInput" value="${week.actual_summary}">
          </div>
          <div class="field" style="margin-top:12px">
            <label>节假日 / 特殊安排</label>
            <input id="holidaySummaryInput" value="${week.holiday_summary || '—'}">
          </div>
          <div class="field" style="margin-top:12px">
            <label>调整原因 / 备注</label>
            <textarea id="noteInput">${week.note || ''}</textarea>
          </div>
          <div class="inline-actions" style="margin-top:12px">
            <button class="btn primary" type="button" id="saveAdjustBtn">保存调整</button>
            <a class="btn" href="picker.html?week=${week.week_no}">进入正式选课</a>
          </div>
        </div>
      `;
      document.getElementById('saveAdjustBtn').onclick = () => {
        week.planned_summary = document.getElementById('plannedSummaryInput').value;
        week.actual_summary = document.getElementById('actualSummaryInput').value;
        week.holiday_summary = document.getElementById('holidaySummaryInput').value;
        week.note = document.getElementById('noteInput').value;
        state.current.updatedAt = new Date().toISOString();
        saveJson(CURRENT_KEY, state.current);
        renderWeeks();
        renderDetail();
      };
    }

    function renderAll(){
      state = getPlanState();
      if (!state.current.weeks.some(item => item.week_no === activeWeek)) {
        activeWeek = state.current.weeks[0].week_no;
      }
      renderBanner();
      renderWeeks();
      renderDetail();
    }

    renderAll();
  </script>
</body>
</html>
