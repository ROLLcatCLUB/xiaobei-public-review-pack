<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教学档案</title>
  <link rel="stylesheet" href="clean.css">
</head>
<body>
  <div class="shell">
    <main class="page">
      <div class="page-head">
        <div class="page-title">
          <small>基础信息</small>
          <h1>教学档案</h1>
        </div>
        <div class="head-actions">
          <button class="btn primary" type="button" id="saveProfileBtn">保存档案</button>
        </div>
      </div>

      <section class="grid-2">
        <article class="card">
          <h2>老师信息</h2>
          <div class="grid-2">
            <div class="field"><label>老师姓名</label><input id="teacherName"></div>
            <div class="field"><label>学科</label><select id="subject"><option>美术</option></select></div>
            <div class="field"><label>任教年级</label><input id="teachingGrades"></div>
            <div class="field"><label>默认排课年级</label><select id="preferredGrade"><option>一年级</option><option>二年级</option><option>三年级</option><option>四年级</option><option>五年级</option><option>六年级</option></select></div>
            <div class="field" style="grid-column:1 / -1"><label>任教班级</label><input id="commonClasses"></div>
          </div>
        </article>

        <article class="card">
          <h2>偏好</h2>
          <div class="grid-2">
            <div class="field"><label>排课偏好</label><select id="scheduleStyle"><option>保守排</option><option>正常排</option><option>紧凑排</option></select></div>
            <div class="field"><label>输出风格</label><select id="outputStyle"><option>简洁</option><option>详细</option></select></div>
          </div>
        </article>
      </section>

      <section class="card" style="margin-top:16px">
        <div class="page-head" style="margin:0 0 12px">
          <div class="page-title" style="gap:2px">
            <small>教师课表</small>
            <h1 style="font-size:24px">按年级维护</h1>
          </div>
          <div class="head-actions">
            <button class="btn" type="button" id="importFeishuBtn">导入飞书现有课</button>
            <button class="btn" type="button" id="addScheduleBtn">新增一行</button>
          </div>
        </div>
        <div class="muted tiny" style="margin-bottom:10px">当前来源：<span id="scheduleSourceText"></span></div>
        <table class="table">
          <thead><tr><th>年级</th><th>班级数</th><th>每周节数</th><th>上课日</th><th>备注</th><th></th></tr></thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="clean-shell.js"></script>
  <script>
    CLEAN_PROTO.mount({ page:'profile', title:'教学档案', assistant:'profile' });
    const KEY = 'xiaobei_teacher_profile_v1';
    const profile = Object.assign(CLEAN_PROTO.ensureProfile(), CLEAN_PROTO.readJson(KEY));
    const FEISHU_ROWS = [
      {grade:'三年级',classCount:'5',weeklyLessons:'2',weekdays:'周四、周五',note:'飞书同步 · 年级课表'},
      {grade:'四年级',classCount:'5',weeklyLessons:'2',weekdays:'周二、周三',note:'飞书同步 · 年级课表'}
    ];
    let rows = Array.isArray(profile.gradeScheduleRows) ? profile.gradeScheduleRows.slice() : [];
    let scheduleSource = profile.scheduleSource || '教学档案维护';
    let feishuImported = !!profile.feishuImported;
    if (!rows.length) rows = FEISHU_ROWS.slice();

    function rowHtml(row,index){
      return `
        <tr>
          <td><input data-index="${index}" data-key="grade" value="${row.grade || ''}"></td>
          <td><input data-index="${index}" data-key="classCount" value="${row.classCount || ''}"></td>
          <td><input data-index="${index}" data-key="weeklyLessons" value="${row.weeklyLessons || ''}"></td>
          <td><input data-index="${index}" data-key="weekdays" value="${row.weekdays || ''}"></td>
          <td><input data-index="${index}" data-key="note" value="${row.note || ''}"></td>
          <td><button class="btn" type="button" data-remove="${index}">删除</button></td>
        </tr>
      `;
    }

    function renderRows(){
      document.getElementById('scheduleSourceText').textContent = scheduleSource;
      document.getElementById('scheduleBody').innerHTML = rows.map(rowHtml).join('');
      document.querySelectorAll('[data-key]').forEach(input => {
        input.oninput = () => { rows[Number(input.dataset.index)][input.dataset.key] = input.value; };
      });
      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.onclick = () => { rows.splice(Number(btn.dataset.remove),1); renderRows(); };
      });
    }

    function fill(){
      document.getElementById('teacherName').value = profile.teacherName || '徐涛老师';
      document.getElementById('subject').value = profile.subject || '美术';
      document.getElementById('teachingGrades').value = profile.teachingGrades || '三年级、四年级';
      document.getElementById('preferredGrade').value = profile.preferredGrade || '三年级';
      document.getElementById('commonClasses').value = profile.commonClasses || '';
      document.getElementById('scheduleStyle').value = profile.scheduleStyle || '保守排';
      document.getElementById('outputStyle').value = profile.outputStyle || '简洁';
      renderRows();
    }

    document.getElementById('addScheduleBtn').onclick = () => {
      rows.push({grade:'',classCount:'',weeklyLessons:'2',weekdays:'周四、周五',note:''});
      scheduleSource = feishuImported ? '飞书现有课（已导入，可继续编辑）' : '教学档案维护';
      feishuImported = false;
      renderRows();
    };
    document.getElementById('importFeishuBtn').onclick = () => {
      rows = FEISHU_ROWS.map(row => Object.assign({}, row));
      scheduleSource = '飞书现有课（模拟导入）';
      feishuImported = true;
      renderRows();
    };
    document.getElementById('saveProfileBtn').onclick = () => {
      localStorage.setItem(KEY, JSON.stringify({
        teacherName: document.getElementById('teacherName').value,
        subject: document.getElementById('subject').value,
        teachingGrades: document.getElementById('teachingGrades').value,
        preferredGrade: document.getElementById('preferredGrade').value,
        commonClasses: document.getElementById('commonClasses').value,
        scheduleStyle: document.getElementById('scheduleStyle').value,
        outputStyle: document.getElementById('outputStyle').value,
        scheduleSource,
        feishuImported,
        gradeScheduleRows: rows,
        scheduleRows: rows
      }));
      location.reload();
    };

    fill();
  </script>
</body>
</html>
