<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小备知识库</title>
  <link rel="stylesheet" href="clean.css">
  <link rel="stylesheet" href="design-saas.css">
</head>
<body>
  <div class="shell">
    <main class="page design-saas knowledge-base-page">
      <div class="page-head">
        <div class="page-title">
          <div class="saas-title-line">
            <h1>小备知识库</h1>
            <span class="saas-title-meta" id="kbMeta">本地资料池</span>
          </div>
          <p>维护教材、课标、教案、内容库导出、资源和教师偏好。</p>
        </div>
        <div class="head-actions">
          <button class="btn" type="button" id="refreshBtn">刷新</button>
          <button class="btn primary" type="button" id="uploadBtn">上传入库</button>
        </div>
      </div>

      <section class="saas-stat-row">
        <article class="saas-stat-card">
          <div class="saas-stat-icon teal" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 5.5A2.5 2.5 0 0 1 7.5 3H19v16H7.5A2.5 2.5 0 0 0 5 21.5v-16Z"></path>
              <path d="M9 7h6"></path>
              <path d="M9 11h7"></path>
            </svg>
          </div>
          <div class="saas-stat-body">
            <div class="saas-stat-number" id="itemCountText">0</div>
            <div class="saas-stat-label">资料条目</div>
            <div class="saas-stat-sublabel" id="kbRootText">本地知识库</div>
          </div>
        </article>
        <article class="saas-stat-card">
          <div class="saas-stat-icon purple" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 7h16"></path>
              <path d="M7 12h10"></path>
              <path d="M10 17h4"></path>
            </svg>
          </div>
          <div class="saas-stat-body">
            <div class="saas-stat-number" id="verifiedCountText">0</div>
            <div class="saas-stat-label">已验证</div>
            <div class="saas-stat-sublabel">可进入 AI 上下文</div>
          </div>
        </article>
        <article class="saas-stat-card">
          <div class="saas-stat-icon orange" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 9v4"></path>
              <path d="M12 17h.01"></path>
              <path d="M10.3 4.3 2.8 17.2A2 2 0 0 0 4.5 20h15a2 2 0 0 0 1.7-2.8L13.7 4.3a2 2 0 0 0-3.4 0Z"></path>
            </svg>
          </div>
          <div class="saas-stat-body">
            <div class="saas-stat-number" id="missingCountText">0</div>
            <div class="saas-stat-label">待补资料</div>
            <div class="saas-stat-sublabel">missing / partial</div>
          </div>
        </article>
      </section>

      <section class="grid-2 knowledge-layout">
        <div class="cards">
          <article class="card editor-card kb-upload-card">
            <div class="kb-card-head">
              <div>
                <small>资料入库</small>
                <h2>上传与元数据</h2>
              </div>
              <span class="status blue" id="apiStatus">连接中</span>
            </div>

            <div class="kb-upload-zone" id="dropzone" tabindex="0">
              <strong id="fileSummary">选择文件</strong>
              <span>支持 md、txt、csv、json、docx、pptx、pdf 和图片。PDF 与图片第一阶段可能需要人工补摘要。</span>
              <input id="fileInput" type="file" multiple hidden accept=".pdf,.doc,.docx,.ppt,.pptx,.txt,.md,.csv,.json,.png,.jpg,.jpeg,.webp">
            </div>

            <div class="grid-3 kb-form-grid">
              <div class="field">
                <label>资料类型</label>
                <select id="docType">
                  <option>教案</option>
                  <option>教材</option>
                  <option>课标</option>
                  <option>教学内容库导出</option>
                  <option>PPT</option>
                  <option>学习单</option>
                  <option>图片</option>
                  <option>教师偏好</option>
                </select>
              </div>
              <div class="field">
                <label>学科</label>
                <input id="subjectInput" value="美术">
              </div>
              <div class="field">
                <label>年级</label>
                <select id="gradeInput">
                  <option value="">不限</option>
                  <option>一年级</option>
                  <option>二年级</option>
                  <option selected>三年级</option>
                  <option>四年级</option>
                  <option>五年级</option>
                  <option>六年级</option>
                </select>
              </div>
              <div class="field">
                <label>单元</label>
                <input id="unitInput" placeholder="第三单元 青绿中国色">
              </div>
              <div class="field">
                <label>课题</label>
                <input id="topicInput" placeholder="走进青绿山水">
              </div>
              <div class="field">
                <label>来源</label>
                <select id="sourceInput">
                  <option>教师上传</option>
                  <option>校内</option>
                  <option>教材</option>
                  <option>课程标准</option>
                  <option>内容库导出</option>
                  <option>网络</option>
                </select>
              </div>
              <div class="field">
                <label>权限级别</label>
                <select id="permissionInput">
                  <option>教师可见</option>
                  <option>管理员可见</option>
                  <option>脱敏样例</option>
                </select>
              </div>
              <div class="field">
                <label>AI 生成</label>
                <select id="aiAllowedInput">
                  <option>是</option>
                  <option>否</option>
                </select>
              </div>
              <div class="field">
                <label>公开展示</label>
                <select id="publicAllowedInput">
                  <option>否</option>
                  <option>是</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label>备注</label>
              <textarea id="noteInput" placeholder="图片质量、适用场景、引用限制等"></textarea>
            </div>

            <div class="kb-result" id="uploadResult"></div>
          </article>

          <article class="card panel-card kb-list-card">
            <div class="kb-card-head">
              <div>
                <small>资料清单</small>
                <h2>本地条目</h2>
              </div>
              <div class="kb-list-actions">
                <select id="filterType" aria-label="按资料类型筛选">
                  <option value="">全部类型</option>
                  <option>教材</option>
                  <option>课标</option>
                  <option>教案</option>
                  <option>教学内容库导出</option>
                  <option>PPT</option>
                  <option>学习单</option>
                  <option>图片</option>
                  <option>教师偏好</option>
                </select>
                <select id="filterGrade" aria-label="按年级筛选">
                  <option value="">全部年级</option>
                  <option>一年级</option>
                  <option>二年级</option>
                  <option>三年级</option>
                  <option>四年级</option>
                  <option>五年级</option>
                  <option>六年级</option>
                </select>
              </div>
            </div>
            <div class="kb-item-list" id="itemList"></div>
          </article>
        </div>

        <aside class="cards">
          <article class="card status-card">
            <h2>检索测试</h2>
            <div class="field">
              <label>关键词</label>
              <input id="searchInput" placeholder="青绿 山水">
            </div>
            <button class="btn primary full-width" type="button" id="searchBtn">搜索</button>
            <div class="kb-mini-list" id="searchResults"></div>
          </article>

          <article class="card status-card">
            <h2>AI 上下文预览</h2>
            <div class="field">
              <label>年级</label>
              <select id="contextGrade">
                <option>三年级</option>
                <option>四年级</option>
                <option>五年级</option>
                <option>六年级</option>
              </select>
            </div>
            <div class="field">
              <label>单元</label>
              <input id="contextUnit" value="第三单元 青绿中国色">
            </div>
            <div class="field">
              <label>课题</label>
              <input id="contextTopic" value="走进青绿山水">
            </div>
            <button class="btn primary full-width" type="button" id="contextBtn">生成预览</button>
            <div class="kb-context-box" id="contextPreview"></div>
          </article>
        </aside>
      </section>
    </main>
  </div>

  <script src="clean-shell.js"></script>
  <script>
    CLEAN_PROTO.mount({ page:'knowledge_base', title:'小备知识库', assistant:'knowledge_base' });

    const state = {
      files: [],
      status: null,
      items: []
    };

    function apiBase(){
      if (window.XIAOBEI_LOCAL_API_BASE) return String(window.XIAOBEI_LOCAL_API_BASE).replace(/\/$/, '');
      const params = new URLSearchParams(location.search);
      const port = params.get('api_port') || localStorage.getItem('xiaobei_local_api_port') || '8082';
      const host = params.get('api_host') || '127.0.0.1';
      if (location.protocol === 'file:' || ['127.0.0.1','localhost'].includes(location.hostname)) {
        return `http://${host}:${port}`;
      }
      return location.origin;
    }

    function apiBaseCandidates(){
      const primary = apiBase();
      const candidates = [primary];
      if (primary.includes(':8082')) candidates.push(primary.replace(':8082', ':18082'));
      if (primary.includes(':18082')) candidates.push(primary.replace(':18082', ':8082'));
      return [...new Set(candidates)];
    }

    async function requestJson(path, options = {}){
      let lastError = null;
      for (const base of apiBaseCandidates()) {
        try {
          const response = await fetch(`${base}${path}`, {
            ...options,
            headers: {
              'Content-Type':'application/json',
              ...(options.headers || {})
            }
          });
          const body = await response.json().catch(() => ({}));
          if (!response.ok || body.success === false) {
            throw new Error(body.error_message || body.message || `HTTP ${response.status}`);
          }
          const matched = base.match(/:(\d+)$/);
          if (matched) localStorage.setItem('xiaobei_local_api_port', matched[1]);
          return body;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error('knowledge_base_api_unavailable');
    }

    function $(id){
      return document.getElementById(id);
    }

    function escapeHtml(value){
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[char]));
    }

    function statusClass(value){
      if (value === 'verified') return 'green';
      if (value === 'missing') return 'amber';
      if (value === 'partial') return 'blue';
      return 'slate';
    }

    function fileToBase64(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || '').split(',')[1] || '');
        reader.onerror = () => reject(reader.error || new Error('file_read_failed'));
        reader.readAsDataURL(file);
      });
    }

    function metadataFromForm(){
      return {
        '资料类型': $('docType').value,
        '学科': $('subjectInput').value.trim() || '美术',
        '年级': $('gradeInput').value,
        '单元': $('unitInput').value.trim(),
        '课题': $('topicInput').value.trim(),
        '来源': $('sourceInput').value,
        '权限级别': $('permissionInput').value,
        '是否可用于AI生成': $('aiAllowedInput').value,
        '是否可公开展示': $('publicAllowedInput').value,
        '备注': $('noteInput').value.trim()
      };
    }

    function renderFileSummary(){
      $('fileSummary').textContent = state.files.length
        ? `${state.files.length} 个文件已选择`
        : '选择文件';
    }

    function setApiStatus(ok, text){
      $('apiStatus').className = `status ${ok ? 'green' : 'amber'}`;
      $('apiStatus').textContent = text;
    }

    function renderStats(){
      const verified = state.items.filter(item => item.source_status === 'verified').length;
      const missing = state.items.filter(item => ['missing','partial'].includes(item.source_status)).length;
      $('itemCountText').textContent = state.items.length;
      $('verifiedCountText').textContent = verified;
      $('missingCountText').textContent = missing;
      $('kbMeta').textContent = state.status?.manifest_path ? '本地 manifest 已连接' : '本地资料池';
      $('kbRootText').textContent = state.status?.kb_root ? state.status.kb_root.split(/[\\/]/).slice(-1)[0] : '本地知识库';
    }

    function itemSummary(item){
      const bits = [item['学科'], item['年级'], item['单元'], item['课题']].filter(Boolean);
      return bits.length ? bits.join(' · ') : item['文件路径或URL'] || item.kb_item_id;
    }

    function renderItems(){
      const type = $('filterType').value;
      const grade = $('filterGrade').value;
      const items = state.items.filter(item => {
        if (type && item['资料类型'] !== type) return false;
        if (grade && item['年级'] !== grade) return false;
        return true;
      });
      $('itemList').innerHTML = items.length ? items.map(item => `
        <div class="kb-item">
          <div class="kb-item-main">
            <div class="kb-item-title">${escapeHtml(item['资料名称'] || item.kb_item_id)}</div>
            <div class="kb-item-meta">${escapeHtml(itemSummary(item))}</div>
            <div class="kb-item-path">${escapeHtml(item['文件路径或URL'] || '未绑定文件')}</div>
          </div>
          <div class="kb-item-tags">
            <span class="status blue">${escapeHtml(item['资料类型'] || '资料')}</span>
            <span class="status ${statusClass(item.source_status)}">${escapeHtml(item.source_status || 'partial')}</span>
            <span class="status slate">${escapeHtml(item['权限级别'] || '教师可见')}</span>
          </div>
        </div>
      `).join('') : '<div class="kb-empty">当前筛选下暂无资料。</div>';
    }

    function renderSearchResults(items){
      $('searchResults').innerHTML = items.length ? items.map(item => `
        <div class="kb-mini-item">
          <strong>${escapeHtml(item.title)}</strong>
          <span>${escapeHtml(item['资料类型'])} · ${escapeHtml(item.source_status)} · score ${escapeHtml(item.score)}</span>
          <p>${escapeHtml(item.excerpt || '')}</p>
        </div>
      `).join('') : '<div class="kb-empty compact">没有命中资料。</div>';
    }

    function renderContextPreview(body){
      const sections = body.sections || {};
      const html = Object.entries(sections).map(([key, section]) => {
        const items = section.items || [];
        return `
          <div class="kb-context-section">
            <div class="kb-context-title">
              <strong>${escapeHtml(key)}</strong>
              <span class="status ${statusClass(section.source_status)}">${escapeHtml(section.source_status)}</span>
            </div>
            ${items.length ? items.map(item => `
              <div class="kb-context-item">
                <span>${escapeHtml(item.title)}</span>
                <small>${escapeHtml(item.excerpt || '')}</small>
              </div>
            `).join('') : '<div class="kb-empty compact">暂无匹配资料。</div>'}
          </div>
        `;
      }).join('');
      const warnings = (body.warnings || []).length
        ? `<div class="kb-warning">${body.warnings.length} 个分区需要补资料或确认引用。</div>`
        : '';
      $('contextPreview').innerHTML = `${warnings}${html}`;
    }

    async function loadStatus(){
      try {
        state.status = await requestJson('/api/xiaobei/kb/status');
        setApiStatus(true, '已连接');
      } catch (error) {
        setApiStatus(false, '未连接');
        $('uploadResult').innerHTML = `<div class="kb-error">${escapeHtml(error.message)}</div>`;
      }
    }

    async function loadItems(){
      const body = await requestJson('/api/xiaobei/kb/items');
      state.items = body.items || [];
      renderStats();
      renderItems();
    }

    async function refreshAll(){
      await loadStatus();
      if (state.status?.success) {
        await loadItems();
      }
    }

    async function uploadSelectedFiles(){
      if (!state.files.length) {
        $('uploadResult').innerHTML = '<div class="kb-error">请先选择文件。</div>';
        return;
      }
      $('uploadResult').innerHTML = '<div class="kb-loading">正在解析并写入本地知识库。</div>';
      const files = await Promise.all(state.files.map(async file => ({
        name: file.name,
        type: file.type || '未知类型',
        size: file.size,
        data_base64: await fileToBase64(file)
      })));
      const body = await requestJson('/api/xiaobei/kb/upload', {
        method:'POST',
        body: JSON.stringify({
          metadata: metadataFromForm(),
          files
        })
      });
      $('uploadResult').innerHTML = `
        <div class="kb-success">已入库 ${body.saved_count || 0} 个文件。</div>
        ${(body.items || []).map(item => `<div class="kb-result-line">${escapeHtml(item.kb_item_id || item.name)} · ${escapeHtml(item.parse_status || item.error_code || '')}</div>`).join('')}
      `;
      state.files = [];
      $('fileInput').value = '';
      renderFileSummary();
      await loadItems();
    }

    async function runSearch(){
      const query = $('searchInput').value.trim();
      const filters = {};
      if ($('filterType').value) filters['资料类型'] = $('filterType').value;
      if ($('filterGrade').value) filters['年级'] = $('filterGrade').value;
      const body = await requestJson('/api/xiaobei/kb/search', {
        method:'POST',
        body: JSON.stringify({ query, filters, limit: 8 })
      });
      renderSearchResults(body.items || []);
    }

    async function buildContext(){
      const body = await requestJson('/api/xiaobei/kb/context', {
        method:'POST',
        body: JSON.stringify({
          subject: $('subjectInput').value.trim() || '美术',
          grade: $('contextGrade').value,
          unit_name: $('contextUnit').value.trim(),
          topic_name: $('contextTopic').value.trim(),
          limit_per_section: 3
        })
      });
      renderContextPreview(body);
    }

    function bindEvents(){
      $('dropzone').onclick = () => $('fileInput').click();
      $('dropzone').onkeydown = event => {
        if (event.key === 'Enter' || event.key === ' ') $('fileInput').click();
      };
      $('dropzone').ondragover = event => {
        event.preventDefault();
        $('dropzone').classList.add('drag-over');
      };
      $('dropzone').ondragleave = () => $('dropzone').classList.remove('drag-over');
      $('dropzone').ondrop = event => {
        event.preventDefault();
        $('dropzone').classList.remove('drag-over');
        state.files = Array.from(event.dataTransfer.files || []);
        renderFileSummary();
      };
      $('fileInput').onchange = event => {
        state.files = Array.from(event.target.files || []);
        renderFileSummary();
      };
      $('uploadBtn').onclick = () => uploadSelectedFiles().catch(error => {
        $('uploadResult').innerHTML = `<div class="kb-error">${escapeHtml(error.message)}</div>`;
      });
      $('refreshBtn').onclick = () => refreshAll().catch(error => {
        $('uploadResult').innerHTML = `<div class="kb-error">${escapeHtml(error.message)}</div>`;
      });
      $('filterType').onchange = renderItems;
      $('filterGrade').onchange = renderItems;
      $('searchBtn').onclick = () => runSearch().catch(error => {
        $('searchResults').innerHTML = `<div class="kb-error">${escapeHtml(error.message)}</div>`;
      });
      $('contextBtn').onclick = () => buildContext().catch(error => {
        $('contextPreview').innerHTML = `<div class="kb-error">${escapeHtml(error.message)}</div>`;
      });
    }

    bindEvents();
    refreshAll().then(() => {
      $('searchInput').value = '青绿';
      return runSearch();
    }).then(() => buildContext()).catch(error => {
      setApiStatus(false, '未连接');
      $('itemList').innerHTML = `<div class="kb-error">${escapeHtml(error.message)}</div>`;
    });
  </script>
</body>
</html>
