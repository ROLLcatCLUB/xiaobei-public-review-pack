<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课前简报</title>
  <link rel="stylesheet" href="clean.css">
  <link rel="stylesheet" href="design-saas.css">
</head>
<body>
  <div class="shell">
    <main class="page design-saas brief-page">
      <div class="page-head">
        <div class="page-title">
          <small id="briefTag">课前定向</small>
          <h1>课前简报</h1>
        </div>
        <div class="head-actions">
          <a class="btn" id="backPickerBtn" href="picker.html">返回正式选课</a>
        </div>
      </div>

      <section id="briefGuard" class="empty hide">请先从正式选课锁定一节课</section>

      <div id="briefContent" class="section">
        <section class="card status-card hero">
          <div class="hero-meta" id="briefHeroMeta"></div>
        </section>

        <section class="identity-strip" id="briefIdentity"></section>

        <section class="grid-3">
          <article class="card panel-card" id="cardFocus"></article>
          <article class="card panel-card" id="cardRisk"></article>
          <article class="card panel-card" id="cardSupport"></article>
        </section>

        <section class="card status-card">
          <h2>下一步怎么做</h2>
          <div class="list" id="decisionSummary"></div>
          <div class="inline-actions" id="nextActions" style="margin-top:12px"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="feishu-real-data-v1.js"></script>
  <script src="prep_truth_source_v1.js"></script>
  <script src="clean-shell.js"></script>
  <script>
    CLEAN_PROTO.mount({ page:'brief', title:'课前简报', assistant:'brief' });
    const source = window.XIAOBEI_PREP_TRUTH_SOURCE_V1;
    const params = new URLSearchParams(window.location.search);

    function readJson(key){
      try{
        return JSON.parse(sessionStorage.getItem(key) || 'null');
      }catch(error){
        return null;
      }
    }

    function taskFromContext(){
      const coursePlanItem = source.resolveCoursePlanContextFromQuery();
      if (coursePlanItem) {
        source.writeCoursePlanSelection(coursePlanItem);
        return coursePlanItem;
      }
      const lesson = readJson(source.storage_keys.selected_context) || readJson(source.storage_keys.selected_context_legacy);
      if (!lesson) return null;
      return source.findCoursePlanItem({
        course_plan_item_id: lesson.course_plan_item_id,
        lesson_key: lesson.lesson_key
      });
    }

    function pickerHref(task){
      const query = new URLSearchParams();
      ['week','unit','className','lessonType','course_plan_item_id','lesson_key','flow'].forEach(key => {
        const value = params.get(key);
        if (value) query.set(key,value);
      });
      if (!query.get('course_plan_item_id') && task?.course_plan_item_id) query.set('course_plan_item_id', task.course_plan_item_id);
      if (!query.get('lesson_key') && task?.lesson_key) query.set('lesson_key', task.lesson_key);
      return `picker.html${query.toString() ? `?${query.toString()}` : ''}`;
    }

    function draftHref(task, entry){
      return `draft.html?entry=${entry}&course_plan_item_id=${task.course_plan_item_id}&lesson_key=${task.lesson_key}`;
    }

    function refineHref(task){
      return `refine.html?course_plan_item_id=${task.course_plan_item_id}&lesson_key=${task.lesson_key}`;
    }

    function render(){
      const task = taskFromContext();
      if (!task) {
        document.getElementById('briefGuard').classList.remove('hide');
        document.getElementById('briefContent').classList.add('hide');
        document.getElementById('briefGuard').textContent = '请先从正式选课锁定一节课';
        return;
      }
      const brief = source.buildBrief(task);
      const draftState = source.getPrepDraftState(task);
      const latest = source.describeLatestPrepRun(task);
      document.getElementById('backPickerBtn').href = pickerHref(task);
      document.getElementById('briefTag').textContent = params.get('flow') === 'fast' ? '简短定向' : '课前定向';
      document.getElementById('briefHeroMeta').innerHTML = `
        <span class="badge green">这节课先看 3 件事</span>
        <span class="badge green">${task.topic_name}</span>
        <span class="pill">${task.week_label} · ${task.date_range}</span>
        <span class="pill">${task.class_name} · ${task.day_label}${task.period}</span>
        <span class="pill">${latest.savedDraftLabel || '未开始'}</span>
      `;
      document.getElementById('briefIdentity').innerHTML = `
        <div class="identity-item"><small>课时身份</small><strong>${task.week_label}｜${task.class_name}</strong></div>
        <div class="identity-item"><small>时间位置</small><strong>${task.day_label}${task.period}</strong></div>
        <div class="identity-item"><small>课题</small><strong>${task.topic_name}</strong></div>
        <div class="identity-item"><small>当前阶段</small><strong>课前简报</strong></div>
        <div class="identity-item"><small>草稿状态</small><strong>${latest.savedDraftLabel || '未保存'}</strong></div>
      `;
      const recommendation = brief.cards.find(item => item.card_type === 'task_recommendation');
      document.getElementById('cardFocus').innerHTML = `<h2>先抓什么</h2><div>${recommendation.bullets[0]}</div>`;
      document.getElementById('cardRisk').innerHTML = `<h2>先防什么</h2><div>${recommendation.bullets[1]}</div>`;
      document.getElementById('cardSupport').innerHTML = `<h2>先备什么</h2><div>${recommendation.bullets[2]}</div>`;

      const next = document.getElementById('nextActions');
      let primaryLabel = '推荐进入快速版';
      let primaryHref = draftHref(task,'rapid');
      if (draftState.refineDraft) {
        primaryLabel = '继续精修页';
        primaryHref = refineHref(task);
      } else if (draftState.rapidDraft) {
        primaryLabel = '继续快速版';
      }
      const minimalLabel = draftState.minimalDraft ? '继续极简版' : '进入极简版';
      const refineLabel = draftState.refineDraft ? '继续精修页' : '进入精修页';
      document.getElementById('decisionSummary').innerHTML = `
        <div class="list-item"><strong>建议动作</strong><div class="muted tiny">先进入快速版，把这一节课立成一份可继续修改的运行稿。</div></div>
        <div class="list-item"><strong>依据</strong><div class="muted tiny">${task.unit_name} · ${task.lesson_type} · ${task.risk_tag}</div></div>
      `;
      next.innerHTML = `
        <a class="btn primary" href="${primaryHref}">${primaryLabel}</a>
        <a class="btn" href="${draftHref(task,'minimal')}">${minimalLabel}</a>
        <a class="btn" href="${refineHref(task)}">${refineLabel}</a>
      `;
    }

    render();
  </script>
</body>
</html>
